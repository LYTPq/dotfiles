# General Settings
enable_audio_bell no
resize_in_steps yes
window_margin_width 0
window_padding_width 8
confirm_os_window_close 0
input_delay 3

# Cursor Settings
cursor_trail 1
cursor_trail_start_threshold 1
cursor_shape block
cursor_blink_interval 0
cursor_shape_unfocused hollow
shell_integration no-cursor

# Font Settings
font_family JetBrains Mono
font_size 10

# Fallback Nerd Font for symbols
symbol_map U+E000-U+F8FF JetBrainsMono Nerd Font Mono

# Opacity and Effects
background_opacity 1
dynamic_background_opacity yes
# background_tint 0.9

# Scrolling
scrollback_lines 10000
scrollback_pager_history_size 100
mouse_wheel_scrolling yes
scrollback_smooth yes
clear_scrollback_on_exit no

# Tab
tab_bar_edge bottom
tab_bar_style powerline
tab_bar_align left
tab_bar_min_tabs 2
tab_switch_strategy previous

enabled_layouts Tall, Horizontal

# Color Scheme
include ~/.config/kitty/themes/gruvbox_dark.conf

# Key bindings
clear_all_shortcuts yes
kitty_mod ctrl+shift

map kitty_mod+c          copy_to_clipboard
map kitty_mod+v          paste_from_clipboard
map kitty_mod+r          load_config_file
map kitty_mod+escape     kitty_shell window

# Font Management
map kitty_mod+equal      change_font_size all +1.0
map kitty_mod+plus       change_font_size all +1.0
map kitty_mod+minus      change_font_size all -1.0
map kitty_mod+backspace  change_font_size all 0

# Custom Text Sent
map ctrl+backspace       send_text all \x17
map ctrl+space           send_text all \x00
