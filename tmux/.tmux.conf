# -------------------------------------------------
# R4PPZ TMUX CONFIGURATION
# -------------------------------------------------

# INITIAL SETUP INSTRUCTIONS
# -------------------------------------------------
# For fresh installation:
# 1. Install TPM: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# 2. Copy or symlink this config to ~/.tmux.conf
# 3. Reload config: tmux source-file ~/.tmux.conf
# 4. Install plugins: prefix (alt+space) + I

# -------------------------------------------------
# CORE SETTINGS
# -------------------------------------------------

# Remove default keybind
unbind c
unbind x
unbind C-b
unbind %
unbind '"'

# Change prefix to Ctrl+Space
set -g prefix M-Space
bind M-Space send-prefix

# Performance & behavior settings
set -g prefix-timeout 1000
set -g repeat-time 1
set -g escape-time 0

set -g history-limit 10000
set -g detach-on-destroy on
set -g mouse on
set -g aggressive-resize on
set -g mode-keys vi
set -g focus-events on
set -g visual-activity off
set -g repeat-time 2000
set -g renumber-windows on
set -g allow-rename off

# Terminal settings & color support
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",tmux-256color:RGB"
set -ga terminal-overrides ",xterm-kitty:RGB,kitty*:RGB"
set -g allow-passthrough on
set -ga terminal-features 'xterm-kitty:kkp'

# Quick reload config
bind R source-file ~/.tmux.conf \; display-message "Config reloaded!"

# -------------------------------------------------
# COPY MODE & BINDINGS
# -------------------------------------------------

# Copy-mode settings
bind Enter copy-mode

# Visual selection bindings
bind -T copy-mode-vi v send-keys -X begin-selection

bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi V send-keys -X select-line
bind -T copy-mode-vi C-v send-keys -X begin-selection \; send-keys -X rectangle-toggle

# Wayland clipboard integration
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy && wl-paste -n | wl-copy -p"
bind p run "wl-paste -n | tmux load-buffer - ; tmux paste-buffer"

bind -T copy-mode-vi Escape if -F '#{selection_present}' 'send-keys -X clear-selection' 'send-keys -X cancel'

bind -T copy-mode-vi C-a send-keys -X start-of-line
bind -T copy-mode-vi C-e send-keys -X end-of-line

bind -T copy-mode-vi S-Up send-keys -X halfpage-up
bind -T copy-mode-vi S-Down send-keys -X halfpage-down

bind -T copy-mode-vi C-Left send-keys -X previous-word
bind -T copy-mode-vi C-Right send-keys -X next-word-end

# -------------------------------------------------
# PANE MANAGEMENT
# -------------------------------------------------

# Pane splits
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
bind M-v split-window -h -c "#{pane_current_path}"
bind M-s split-window -v -c "#{pane_current_path}"

# Pane navigation with Alt+Arrow (no prefix)
bind Left select-pane -L
bind Right select-pane -R
bind Up select-pane -U
bind Down select-pane -D

# Fullscreen a pane
bind f resize-pane -Z
bind M-f resize-pane -Z

# Resize pane
bind -r C-Up    resize-pane -U
bind -r C-Down  resize-pane -D
bind -r C-Left  resize-pane -L
bind -r C-Right resize-pane -R

# Switch pane without exiting fullscreen
bind -r S-Left if-shell -F '#{window_zoomed_flag}' 'select-pane -L; resize-pane -Z' 'select-pane -L'
bind -r S-Right if-shell -F '#{window_zoomed_flag}' 'select-pane -R; resize-pane -Z' 'select-pane -R'

# -------------------------------------------------
# WINDOW MANAGEMENT
# -------------------------------------------------

# Rename and lock autorename for this window
bind r command-prompt -p "Rename window:" "rename-window '%%'\; set-option -w @tmux_rename_locked 1"
bind M-r command-prompt -p "Rename window:" "rename-window '%%'\; set-option -w @tmux_rename_locked 1"

# Unlock autorename for current window
bind C-r set-option -w @tmux_rename_locked 0 \; display-message "Autorename: unlocked for this window"

# New window
bind n   run-shell 'tmux new-window -n "CMD" -c "#{pane_current_path}"'
bind M-n run-shell 'tmux new-window -n "CMD" -c "#{pane_current_path}"'

# Kill & detached
bind q   kill-pane
bind M-q kill-pane
bind d   detach

# Kill all windows and panes except the current one
bind M-Q run-shell "tmux kill-window -a; tmux kill-pane -a"

# Switch windows
bind -r M-Left  previous-window
bind -r M-Right next-window
bind -r M-Down  previous-window
bind -r M-Up    next-window

bind -r C-M-Left  swap-window -t -1 \; select-window -t -1
bind -r C-M-Right swap-window -t +1 \; select-window -t +1

# Quick window selection with Alt+number (no prefix)
bind -n M-1 select-window -t :0
bind -n M-2 select-window -t :1
bind -n M-3 select-window -t :2
bind -n M-4 select-window -t :3
bind -n M-5 select-window -t :4
bind -n M-6 select-window -t :5
bind -n M-7 select-window -t :6
bind -n M-8 select-window -t :7
bind -n M-9 select-window -t :8

# -------------------------------------------------
# STYLING
# -------------------------------------------------

# Pane styling
set -g pane-border-style 'fg=#918273,bg=#282828'
set -g pane-active-border-style 'fg=#83a598,bg=#282828'

# Status bar base styling
set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-justify left
set -g status-bg '#32302F'
set -g status-fg '#ebdbb2'

# Remove status bar if theres only one
set-hook -g window-linked "if -F '#{==:#{session_windows},1}' 'set status off' 'set status on'"
set-hook -g window-unlinked "if -F '#{==:#{session_windows},1}' 'set status off' 'set status on'"
set-hook -g after-new-session "if -F '#{==:#{session_windows},1}' 'set status off' 'set status on'"

# Window appearance in status bar
setw -g window-status-format '#[bg=#3D3D3D,fg=#ebdbb2]  #W  '
setw -g window-status-current-format '#[bg=#83a598,fg=#282828,bold]  #W  '
setw -g window-status-separator ''

# Message styling
set -g message-style 'fg=#83a598,bg=#282828,bold'

# Status line content
set -g status-left-length 100
set -g status-right-length 100
set -g status-left ""
set -g status-right '#{?window_zoomed_flag,F} #{prefix_highlight}'

# -------------------------------------------------
# PLUGINS
# -------------------------------------------------

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'nhdaly/tmux-better-mouse-mode'
set -g @plugin 'tmux-plugins/tmux-open'

# Plugin: prefix-highlight configuration
set -g @prefix_highlight_fg '#3D3D3D'
set -g @prefix_highlight_bg '#83a598,bold'
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_show_sync_mode 'on'
set -g @prefix_highlight_copy_mode_attr 'fg=#282828,bg=#fabd2f,bold'
set -g @prefix_highlight_sync_mode_attr 'fg=#282828,bg=#b8bb26,bold'
set -g @prefix_highlight_prefix_prompt 'WAIT'
set -g @prefix_highlight_copy_prompt 'COPY'
set -g @prefix_highlight_sync_prompt 'SYNC'
set -g @prefix_highlight_empty_prompt '     '

# Plugin: tmux-open configuration
set -g @open-S 'https://duckduckgo.com/?q='

# Initialize TMUX Plugin Manager (keep at the very end)
run '~/.tmux/plugins/tpm/tpm'
