# for more configuration options, refer https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock

$font = JetBrainsMono

general {
    hide_cursor = false
}

animations {
  enabled = true
  bezier = linear,0,0,1,1
  bezier = smooth,0.25,0.1,0.25,1.0

  animation = fadeIn, 1, 1.5, smooth
  animation = fadeOut, 1, 1.2, smooth
  animation = inputFieldDots, 1, 2.5, linear
}

background {
  monitor =
  path = $DOTFILES/wallpaper/wallpaper1.png
  blur_passes = 3
}

input-field {
  monitor =
  size = 25%, 7%
  outline_thickness = 2
  inner_color = rgba(0, 0, 0, 0.0)

  outer_color = rgb(d8c9a4)
  check_color = rgb(fabd2f)
  fail_color = rgb(cc241d)

  font_color = rgb(d8c9a4)
  fade_on_empty = false
  rounding = 5

  font_family = $font
  placeholder_text = Input password
  check_text = Authenticating

  fail_text = $PAMFAIL

  # dots_text_format = *
  dots_size = 0.1
  dots_spacing = 0.4

  hide_input = false

  position = 0, -20
  halign = center
  valign = center
}

# TIME
label {
  monitor =
  text = $TIME12
  font_size = 80
  font_family = $font

  position = -30, 0
  halign = right
  valign = top
}

# DATE
label {
  monitor =
  text = cmd[update:60000] date +"%A, %d %B %Y" # update every 60 seconds
  font_size = 25
  font_family = $font

  position = -30, -150
  halign = right
  valign = top
}

