bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, E, exec, $filemanager
bind = $mainMod, D, exec, $launcher
bind = $mainMod, T, exec, $terminal
bind = $mainMod, L, exec, $lockscreen
bind = $mainMod, N, exec, $notifpanel
bind = $mainMod, slash, exec, $websearch
bind = $mainMod, F, fullscreen
bind = $mainMod SHIFT, K, forcekillactive
bind = $mainMod SHIFT, Q, killactive
bind = $mainMod SHIFT, F, exec, hyprctl dispatch fullscreenstate 0 2
bind = $mainMod SHIFT, SPACE, togglefloating
bind = $mainMod SHIFT, Z, exec, $zen
bind = $mainMod SHIFT, E, exec, $powermenu

bind = ALT, TAB, layoutmsg, rollnext
bind = ALT, TAB, layoutmsg, focusmaster master
bind = ALT SHIFT, TAB, layoutmsg, rollprev
bind = ALT SHIFT, TAB, layoutmsg, focusmaster master

# Prevent accidental dragging
binds {
  drag_threshold = 5
}

# Move and resize windows with mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, G, resizewindow

# Zoom out/in
bind = $mainMod SHIFT, mouse_up, exec, $zoom out
bind = $mainMod SHIFT, mouse_down, exec, $zoom in

# Change focus on windows
bind = CTRL ALT, TAB, cyclenext
bind = CTRL ALT SHIFT, TAB, cyclenext, prev
bind = CTRL ALT, TAB, bringactivetotop
bind = CTRL ALT SHIFT, TAB, bringactivetotop

# To go to previous workspace
bind = $mainMod, TAB, workspace, previous

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move window
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Move windows (floating)
binde = $mainMod CTRL, left, moveactive, -40 0
binde = $mainMod CTRL, right, moveactive, 40 0
binde = $mainMod CTRL, up, moveactive, 0 -40
binde = $mainMod CTRL, down, moveactive, 0 40

# Special workspace (scratchpad)
workspace = special:window, gapsin:3, gapsout:120 240 120 240
bind = $mainMod, W, togglespecialworkspace, window
bind = $mainMod SHIFT, W, movetoworkspace, special:window

# SecondSpecial workspace (scratchpad)
workspace = special:windows, gapsin:3, gapsout:120 240 120 240
bind = $mainMod, backslash, togglespecialworkspace, windows
bind = $mainMod SHIFT, backslash, movetoworkspace, special:windows

# minimize (kinda)
workspace = special:minimize, gapsin:2, gapsout:5, border:false
bind = $mainMod, X, movetoworkspacesilent, special:minimize
bind = $mainMod, grave, togglespecialworkspace, minimize

# Scroll through existing workspaces
bind = $mainMod, mouse_up, workspace, e+1
bind = $mainMod, mouse_down, workspace, e-1
bind = , Page_Up, workspace, e-1
bind = , Page_Down, workspace, e+1

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Laptop multimedia keys for volume, mute, brightness (script required)
bindel = ,XF86AudioRaiseVolume, exec, $mediactl volume-up
bindel = ,XF86AudioLowerVolume, exec, $mediactl volume-down
bindel = ,XF86AudioMute, exec, $mediactl mute
bindel = ,XF86AudioMicMute, exec, $mediactl mic-mute
bindel = ,XF86MonBrightnessUp, exec, $mediactl brightness-up
bindel = ,XF86MonBrightnessDown, exec, $mediactl brightness-down

