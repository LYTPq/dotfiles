bind = $mainMod, SPACE, submap, Applications
submap = Applications, reset

bind = , A, exec, $browser --new-tab https://annas-archive.li
bind = , W, exec, $browser --new-tab https://www.w3schools.com
bind = , Y, exec, $browser --new-tab https://www.youtube.com
bind = , F, exec, $browser --new-tab https://www.facebook.com/messages
bind = , G, exec, $browser --new-tab https://github.com/r4ppz
bind = , D, exec, $browser --new-tab https://drive.google.com/drive/my-drive
bind = , M, exec, $browser --new-tab https://mail.google.com
bind = , E, exec, $browser --new-tab https://getemoji.com
bind = , N, exec, $browser --new-tab https://news.ycombinator.com
bind = , T, exec, $browser --new-tab https://monkeytype.com
bind = , C, exec, $browser --new-tab https://dash.cloudflare.com/

bind = , V, exec, $ide
bind = , P, exec, $passmanager

# Clean UI with --app option:
bind = $mainMod, S, exec, $browser --app=https://open.spotify.com
bind = $mainMod, N, exec, $browser --app=https://news.ycombinator.com
bind = $mainMod, D, exec, $browser --app=https://devdocs.io
bind = $mainMod, G, exec, $browser --app=https://github.com/r4ppz
bind = $mainMod, F, exec, $browser --app=https://www.facebook.com/messages
bind = $mainMod, Y, exec, $browser --app=https://www.youtube.com
bind = $mainMod, T, exec, $browser --app=https://monkeytype.com
bind = $mainMod, M, exec, $browser --app=https://music.youtube.com

bind = $mainMod SHIFT, M, exec, $browser --app=https://mappl.tv

bind = , catchall, submap, reset
submap = reset

# =================================================
# School Works
# =================================================
bind = $mainMod, S, submap, School
submap = School, reset

bind = $mainMod, C, exec, $browserForSchool --app=https://classroom.google.com
bind = $mainMod, M, exec, $browserForSchool --app=https://mail.google.com/

bind = , catchall, submap, reset
submap = reset

# =================================================
# Utils
# =================================================
bind = $mainMod, U, submap, util
submap = util

bind = SHIFT, S, exec, bash -c "$screenshotfull; hyprctl dispatch submap reset"
bind = , S, exec, bash -c "$screenshot; hyprctl dispatch submap reset"
bind = , R, exec, bash -c "$record; hyprctl dispatch submap reset"
bind = , O, exec, bash -c "$ocr; hyprctl dispatch submap reset"
bind = , C, exec, bash -c "$colorpicker; hyprctl dispatch submap reset"
bind = , E, exec, bash -c "$eyetemp; hyprctl dispatch submap reset"

bindel = ,1, exec, $mediactl mute
bindel = ,2, exec, $mediactl mic-mute
bindel = ,3, exec, $mediactl volume-down
bindel = ,4, exec, $mediactl volume-up
bindel = ,5, exec, $mediactl brightness-down
bindel = ,6, exec, $mediactl brightness-up
bindl = , 7, exec, playerctl previous
bindl = , 8, exec, playerctl next
bindl = , 9, exec, playerctl play-pause
bindl = , 0, exec, playerctl play-pause

# Prevent from falling through to catchall
bind = , Shift_L, exec, true

bind = , catchall, submap, reset
submap = reset

# =================================================
# Resize windows
# =================================================
bind = $mainMod, R, submap, resize
submap = resize

binde = , right, resizeactive, 20 0
binde = , left, resizeactive, -20 0
binde = , up, resizeactive, 0 -20
binde = , down, resizeactive, 0 20

bind = , catchall, submap, reset
submap = reset

