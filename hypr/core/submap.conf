# =================================================
# Launch applications/links
# =================================================
bind = $mainMod, SPACE, submap, Links
submap = Links, reset

bind = , A, exec, $browser --new-tab https://www.gmail.com
bind = , W, exec, $browser --new-tab https://www.github.com
bind = , Y, exec, $browser --new-tab https://www.youtube.com
bind = , I, exec, $browser --new-tab https://is.cuni.cz/studium/index.php
bind = , G, exec, $browser --new-tab https://github.com/lytpq
bind = , M, exec, $browser --new-tab https://monkeytype.com
bind = , C, exec, $browser --new-tab https://claude.ai
bind = , E, exec, $browser --new-tab https://gemini.google.com
bind = , S, exec, $browser --new-tab https://open.spotify.com
bind = , T, exec, $browser --new-tab https://gitlab.mff.cuni.cz/dashboard/projects/member
bind = , F, exec, $browser --new-tab https://fmhy.net

bind = , catchall, submap, reset
submap = reset

