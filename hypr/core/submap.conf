# =================================================
# Launch AI web applications
# =================================================
bind = $mainMod, A, submap, AI Slop
submap = AI Slop, reset

# Clean UI with --app option:
bind = $mainMod, V, exec, $browser --app=https://copilot.microsoft.com
bind = $mainMod, K, exec, $browser --app=https://www.kimi.com
bind = $mainMod, X, exec, $browser --app=https://github.com/copilot
bind = $mainMod, C, exec, $browser --app=https://chatgpt.com/?temporary-chat=true
bind = $mainMod, P, exec, $browser --app=https://www.perplexity.ai
bind = $mainMod, G, exec, $browser --app=https://gemini.google.com/app
bind = $mainMod, D, exec, $browser --app=https://chat.deepseek.com
bind = $mainMod, N, exec, $browser --app=https://notebooklm.google.com
bind = $mainMod, Q, exec, $browser --app=https://chat.qwen.ai/?temporary-chat=true; hyprctl dispatch submap reset
bind = $mainMod, H, exec, $browser --app=https://huggingface.co/chat
bind = $mainMod, A, exec, $browser --app=https://claude.ai

# Normal website UI
bind = , C, exec, $browser --new-tab https://chatgpt.com/?temporary-chat=true
bind = , G, exec, $browser --new-tab https://gemini.google.com/app
bind = , P, exec, $browser --new-tab https://www.perplexity.ai
bind = , D, exec, $browser --new-tab https://chat.deepseek.com
bind = , Q, exec, $browser --new-tab https://chat.qwen.ai/?temporary-chat=true
bind = , K, exec, $browser --new-tab https://www.kimi.com
bind = , N, exec, $browser --new-tab https://notebooklm.google.com
bind = , X, exec, $browser --new-tab https://github.com/copilot
bind = , A, exec, $browser --new-tab https://claude.ai

bind = , catchall, submap, reset
submap = reset

