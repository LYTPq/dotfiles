general {
  gaps_in = 3
  gaps_out = 5

  border_size = 2

  col.active_border = rgb(83A598)
  col.inactive_border = rgb(504945)

  resize_on_border = false

  allow_tearing = true

  snap {
    enabled = true
    border_overlap = true
    monitor_gap = 5
    window_gap = 5
  }

  layout = master
}

dwindle {
  pseudotile = true
  preserve_split = true
  force_split = 3
  split_bias = 2
}

master {
  new_status = slave
  mfact = 0.60
}

decoration {
  rounding = 1
  rounding_power = 5

  active_opacity = 1
  inactive_opacity = 1
  fullscreen_opacity = 1.0

  dim_inactive = true
  dim_strength = 0.2

  shadow {
    enabled = false
    range = 1
    render_power = 1
    sharp = false
    ignore_window = true
    color = rgba(000000aa)
  }

  blur {
    enabled = false
    special = true
    size = 6
    passes = 1
    new_optimizations = true
    ignore_opacity = true
    xray = false
    noise = 0.01
  }
}

misc {
  force_default_wallpaper = 0
  disable_hyprland_logo = true
  font_family = "JetBrainsMono Nerd Font"
  focus_on_activate = true
  middle_click_paste = true
  vfr = true
  vrr = 1
  always_follow_on_dnd = true
  close_special_on_empty = true
}

render {
  direct_scanout = 2
  new_render_scheduling = true
}
